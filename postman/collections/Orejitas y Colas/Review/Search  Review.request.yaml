$kind: http-request
description: >-
  # Search Review


  ## Overview


  Retrieves detailed information about a specific review by its unique
  identifier. This endpoint returns the complete review data including rating,
  comment, and associated shelter and user information.


  ## Request Details


  - **Method**: `GET`

  - **Endpoint**: `/search/{id}`

  - **Content-Type**: Not required for GET requests


  ### Path Parameters


  | Parameter | Type | Required | Description |

  |-----------|------|----------|-------------|

  | `id` | Long | Yes | The unique identifier of the review to retrieve |


  ## Response


  ### Success Response (200 OK)


  Returns a JSON object containing the complete review information:


  ```json

  {
    "id": 1,
    "shelterId": 5,
    "userId": 10,
    "rating": 5,
    "comment": "Excellent shelter with caring staff!",
    "reviewDate": "2024-01-15"
  }

  ```


  ## HTTP Status Codes


  | Status Code | Description |

  |-------------|-------------|

  | 200 | Success - Review found and returned |

  | 404 | Not Found - No review exists with the provided ID |

  | 500 | Internal Server Error - An unexpected error occurred |


  ## Resource Representation


  The review resource includes all attributes defined in the Review entity,
  providing complete feedback information including ratings and user comments.
