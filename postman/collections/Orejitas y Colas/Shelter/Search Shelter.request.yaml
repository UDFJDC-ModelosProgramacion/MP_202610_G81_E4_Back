$kind: http-request
description: >-
  # Search Shelter


  ## Overview


  Retrieves detailed information about a specific shelter by its unique
  identifier. This endpoint returns comprehensive shelter data including contact
  information, location, capacity, and operational details.


  ## Request Details


  - **Method**: `GET`

  - **Endpoint**: `/search/{id}`

  - **Content-Type**: Not required for GET requests


  ### Path Parameters


  | Parameter | Type | Required | Description |

  |-----------|------|----------|-------------|

  | `id` | Long | Yes | The unique identifier of the shelter to retrieve |


  ## Response


  ### Success Response (200 OK)


  Returns a JSON object containing the complete shelter information:


  ```json

  {
    "id": 1,
    "name": "Happy Paws Shelter",
    "address": "123 Main Street",
    "city": "Springfield",
    "phone": "+1-555-0123",
    "email": "contact@happypaws.org",
    "capacity": 50,
    "availableSpace": 15
  }

  ```


  ## HTTP Status Codes


  | Status Code | Description |

  |-------------|-------------|

  | 200 | Success - Shelter found and returned |

  | 404 | Not Found - No shelter exists with the provided ID |

  | 500 | Internal Server Error - An unexpected error occurred |


  ## Resource Representation


  The shelter resource includes all attributes defined in the Shelter entity,
  providing a complete view of the shelter's current state in the system.
