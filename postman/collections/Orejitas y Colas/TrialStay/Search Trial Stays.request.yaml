$kind: http-request
description: >-
  # Search Trial Stays


  ## Overview


  Retrieves a list of trial stays, typically filtered by criteria such as pet
  ID, adopter ID, or status. This endpoint allows querying multiple trial stay
  records to monitor ongoing trials and track outcomes.


  ## Request Details


  - **Method**: `GET`

  - **Endpoint**: `/search/{id}`

  - **Content-Type**: Not required for GET requests


  ### Path Parameters


  | Parameter | Type | Required | Description |

  |-----------|------|----------|-------------|

  | `id` | Long | Yes | The identifier used to filter trial stays (e.g., pet ID
  or adopter ID) |


  ## Response


  ### Success Response (200 OK)


  Returns a JSON array containing trial stay information:


  ```json

  [
    {
      "id": 1,
      "petId": 15,
      "adopterId": 20,
      "startDate": "2024-01-20",
      "endDate": "2024-02-03",
      "status": "ACTIVE",
      "notes": "First-time adopter, requires follow-up"
    },
    {
      "id": 2,
      "petId": 15,
      "adopterId": 22,
      "startDate": "2024-02-10",
      "endDate": "2024-02-24",
      "status": "PENDING",
      "notes": "Experienced pet owner"
    }
  ]

  ```


  ## HTTP Status Codes


  | Status Code | Description |

  |-------------|-------------|

  | 200 | Success - Trial stays found and returned |

  | 404 | Not Found - No trial stays found matching the criteria |

  | 500 | Internal Server Error - An unexpected error occurred |


  ## Resource Representation


  This endpoint provides access to multiple trial stay records, enabling
  shelters to monitor ongoing trial periods, track success rates, and manage the
  trial adoption process effectively.
url: "{{base_url}}/search/{{ultimo_id_trial_stay}}"
method: GET
